version: 2
updates:
  # Keep GitHub Actions (checkout, setup-python, codecov) current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep Python dependencies (pyproject) current.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
